
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Working Keypad: 0–9 + Forward/Backward</title>
<style>
  :root{
    --bg: #101318;
    --panel: #171b22;
    --panel-border: #232a36;
    --display-bg: #ffffff;
    --display-text: #1b2230;
    --display-border: #d8dee9;
    --accent: #4da3ff;
    --key-text: #eaf0ff;

    --panel-w: 340px;
    --panel-h: auto;
    --display-h: 72px;
    --key-size: 92px;
    --gap: 12px;
    --radius-panel: 26px;
    --radius-display: 14px;
    --radius-key: 18px;
    --focus-ring: #74b2ff;
  }

  /* Page backdrop */
  body{
    margin:0;
    min-height:100svh;
    display:grid;
    place-items:center;
    background:
      radial-gradient(800px 400px at 70% -10%, rgba(77,163,255,.25) 0%, transparent 60%),
      radial-gradient(600px 300px at 10% 110%, rgba(77,255,186,.12) 0%, transparent 55%),
      var(--bg);
    color:#fff;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
  }

  /* Outer container */
  .panel{
    width:var(--panel-w);
    border-radius:var(--radius-panel);
    background: linear-gradient(180deg, #0e1218 0%, var(--panel) 100%);
    border:1px solid var(--panel-border);
    box-shadow: 0 30px 60px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.06);
    padding: 22px 20px;
    display:grid;
    gap: 18px;
  }


/* Display container (unchanged except for centering help) */
.display{
  height: var(--display-h);
  background: var(--display-bg);
  color: var(--display-text);
  border: 1px solid var(--display-border);
  border-radius: var(--radius-display);
  box-shadow: 0 10px 18px rgba(0,0,0,.35), inset 0 1px 0 rgba(0,0,0,.03);

  /* Make the input fill and center vertically */
  display: grid;
  align-items: center;      /* vertical centering for the input */
  padding: 12px 14px;
}

/* Center text inside the input */
.display input{
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  background: transparent;

  /* Center the digits horizontally */
  text-align: center;

  /* Larger size + improved legibility */
  font-size: 36px;          /* was 28px; raise to taste */
  font-weight: 800;         /* slightly bolder */
  letter-spacing: .06em;    /* a bit more spacing for readability */

  /* Optional: taller line-height for perfect vertical visual centering */
  line-height: 1.2;

  /* Keep the caret visible and on-brand */
  caret-color: var(--accent);
}

/* Selection color (still fine) */
.display input::selection{ background: #e8f1ff; }


  /* Control row: Backward/Forward */
  .controls{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .btn{
    border:1px solid #0a0d12;
    border-radius: 12px;
    background: linear-gradient(135deg, #233043 0%, #192331 55%);
    color:#cfe3ff;
    height:44px;
    display:grid;
    place-items:center;
    font-weight:600;
    cursor:pointer;
    user-select:none;
    transition: transform .12s ease, box-shadow .12s ease, filter .12s ease, background .12s ease;
    box-shadow: 0 6px 14px rgba(0,0,0,.45), inset 0 -1px 0 rgba(0,0,0,.35);
    outline: none;
  }
  .btn:hover{ filter: brightness(1.06); }
  .btn:active{ transform: translateY(1px); box-shadow: 0 4px 10px rgba(0,0,0,.55), inset 0 2px 8px rgba(0,0,0,.55); }
  .btn:focus-visible{
    box-shadow: 0 0 0 2px rgba(0,0,0,.65), 0 0 0 4px var(--focus-ring), 0 6px 14px rgba(0,0,0,.45);
  }

  /* Keypad grid */
  .keys{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--gap);
  }

  /* Key style */
  .key{
    position:relative;
    border-radius:var(--radius-key);
    background:
      linear-gradient(135deg, #2a3342 0%, #1b2230 60%),
      radial-gradient(120px 80px at 30% 20%, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 55%);
    box-shadow: 0 8px 16px rgba(0,0,0,.45), inset 0 -2px 0 rgba(0,0,0,.35);
    border:1px solid #0a0d12;
    display:grid;
    place-items:center;
    color:var(--key-text);
    text-align:center;
    font-weight:800;
    letter-spacing:.02em;
    user-select:none;
    cursor:pointer;
    height: var(--key-size);
    font-size: 30px;
    outline: none;
    transition: transform .12s ease, box-shadow .12s ease, background .12s ease, filter .12s ease;
  }

  /* Interaction states */
  @media (hover:hover){ .key:hover{ filter: brightness(1.06) saturate(1.02); } }
  .key:focus-visible{
    box-shadow: 0 0 0 2px rgba(0,0,0,.65), 0 0 0 4px var(--focus-ring), 0 8px 16px rgba(0,0,0,.45), inset 0 -2px 0 rgba(0,0,0,.35);
  }
  .key:active{
    transform: translateY(2px) scale(.985);
    background: linear-gradient(135deg, #222a38 0%, #141a24 60%), radial-gradient(120px 80px at 30% 20%, rgba(255,255,255,.06) 0%, rgba(255,255,255,0) 55%);
    box-shadow: 0 4px 8px rgba(0,0,0,.55), inset 0 3px 10px rgba(0,0,0,.55);
  }

  /* Footer dots (decoration) */
  .dots{
    display:flex;
    justify-content:center;
    gap:8px;
    opacity:.35;
    margin-top: 4px;
  }
  .dots i{
    width:6px; height:6px;
    border-radius:50%;
    background:#93baff;
  }
  
.display.success {
  background: #19b36b;               /* green background */
  border-color: #128a53;             /* darker green border */
  box-shadow: 0 10px 18px rgba(0,0,0,.35),
              inset 0 1px 0 rgba(255,255,255,.10);
}

/* Keep digits readable on green */
.display.success input{
  color: #062a18;                    /* deep green text for contrast */
}

/* Optional: subtle glow */
.display.success{
  outline: 0;
}
.display.success::before{ opacity: .12; }
  

  /* Responsive */
  @media (max-width: 420px){
    :root{
      --panel-w: 92vw;
      --display-h: 18vw;
      --key-size: 22vw;
      --gap: 3.2vw;
    }
	
  .display input{
    font-size: 8vw;    /* scales with viewport; ~32–36px on phones */
    letter-spacing: .04em;
  }

  }
</style>
</head>
<body>

<section class="panel" aria-label="Interactive keypad with display and forward/backward controls">
  <!-- Display -->
  <div class="display">
    <!-- Using a text input for easy caret control -->
    <input 
		id="readout" 
		type="text" 
		aria-label="Display area showing digits pressed" 
		placeholder="...."
		inputmode="numeric"
		pattern="\d*"
		maxlength="4"
/>
  </div>

 
<!-- Controls -->
<div class="controls" aria-label="Caret and Enter controls">
  <button id="btnBack" class="btn" type="button" aria-label="Delete character to the left">Delete &larr;</button>
  <button id="btnEnter" class="btn accent" type="button" aria-label="Submit value">Enter ⏎</button>
  <button id="btnFwd"  class="btn" type="button" aria-label="Delete character to the right">Delete &rarr;</button>
</div>




  <!-- Keypad -->
  <div class="keys" role="group" aria-label="Numeric keypad">
    <!-- 1–9 -->
    <button class="key" data-digit="1" type="button" aria-label="Digit 1">1</button>
    <button class="key" data-digit="2" type="button" aria-label="Digit 2">2</button>
    <button class="key" data-digit="3" type="button" aria-label="Digit 3">3</button>

    <button class="key" data-digit="4" type="button" aria-label="Digit 4">4</button>
    <button class="key" data-digit="5" type="button" aria-label="Digit 5">5</button>
    <button class="key" data-digit="6" type="button" aria-label="Digit 6">6</button>

    <button class="key" data-digit="7" type="button" aria-label="Digit 7">7</button>
    <button class="key" data-digit="8" type="button" aria-label="Digit 8">8</button>
    <button class="key" data-digit="9" type="button" aria-label="Digit 9">9</button>

    <!-- 0 centered on last row -->
    <div style="visibility:hidden"></div> <!-- spacer -->
    <button class="key" data-digit="0" type="button" aria-label="Digit 0">0</button>
    <div style="visibility:hidden"></div> <!-- spacer -->
  </div>

  <div class="dots" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
</section>


<script>
  // ===== References (unchanged) =====
  const readout   = document.getElementById('readout');
  const btnBack   = document.getElementById('btnBack');
  const btnFwd    = document.getElementById('btnFwd');
  const btnEnter  = document.getElementById('btnEnter');
  const keys      = document.querySelectorAll('.key');
  const historyList = document.getElementById('history');
  const displayEl = document.querySelector('.display'); // parent container
  const TARGET_OK = '3333';

  const MAX_LEN = 4;
  readout.focus();

  function setCaret(pos){
    const p = Math.max(0, Math.min(pos, readout.value.length));
    readout.setSelectionRange(p, p);
    readout.focus();
  }
  function getCaret(){ return readout.selectionStart ?? readout.value.length; }

  // ===== Insert digit (guarded by MAX_LEN) =====
  function insertDigit(d){
    const start  = readout.selectionStart ?? readout.value.length;
    const end    = readout.selectionEnd   ?? readout.value.length;

    // Build the candidate value
    const before = readout.value.slice(0, start);
    const after  = readout.value.slice(end);
    const candidate = (before + d + after).replace(/\D+/g, ''); // digits only

    // If candidate would exceed 4, refuse the insert
    if (candidate.length > MAX_LEN) return;

    readout.value = candidate;
    setCaret((before + d).length);
	
	// updateSuccessState();   
  }

  // ===== Delete left/right (unchanged) =====
  function deleteLeft(){
    const start = readout.selectionStart ?? readout.value.length;
    const end   = readout.selectionEnd   ?? readout.value.length;

    if (start !== end) {
      const before = readout.value.slice(0, start);
      const after  = readout.value.slice(end);
      readout.value = (before + after).slice(0, MAX_LEN);
      setCaret(before.length);
      return;
    }
    if (start > 0) {
      const before = readout.value.slice(0, start - 1);
      const after  = readout.value.slice(start);
      readout.value = (before + after).slice(0, MAX_LEN);
      setCaret(start - 1);
    }
  }
  function deleteRight(){
    const start = readout.selectionStart ?? readout.value.length;
    const end   = readout.selectionEnd   ?? readout.value.length;

    if (start !== end) {
      const before = readout.value.slice(0, start);
      const after  = readout.value.slice(end);
      readout.value = (before + after).slice(0, MAX_LEN);
      setCaret(before.length);
      return;
    }
    if (start < readout.value.length) {
      const before = readout.value.slice(0, start);
      const after  = readout.value.slice(start + 1);
      readout.value = (before + after).slice(0, MAX_LEN);
      setCaret(start);
    }
  }


  function submitCurrent(){
    const value = readout.value.trim();

    // Apply success state ONLY on Enter, and ONLY for "3333"
    if (value === TARGET_OK) {
      displayEl.classList.add('success');
	  readout.value = 'Success';

    } else {
      // Remove success if current submission doesn't match
      displayEl.classList.remove('success');
	  readout.value = 'Try Again';
    }

    // Dispatch your submit event
    const evt = new CustomEvent('keypad:submit', { detail: { value } });
    readout.dispatchEvent(evt);

    // Update history (unchanged)
    if (value.length){
      const li = document.createElement('li');
      li.textContent = value;
      historyList?.prepend(li);
    }

    // Clear display & caret after submit and keep success as-is
    // If you prefer success to disappear after clearing, uncomment the next line.
    //readout.value = '';
    setCaret(0);
    //displayEl.classList.remove('success'); // uncomment to clear success after reset
  }



  // ===== Wire up buttons =====
  keys.forEach(btn=>{
    btn.addEventListener('click', () => insertDigit(btn.dataset.digit));
  });
  btnBack.addEventListener('click', () => { deleteLeft();  readout.focus(); });
  btnFwd .addEventListener('click', () => { deleteRight(); readout.focus(); });
  btnEnter.addEventListener('click', () => { submitCurrent(); readout.focus(); });

  // ===== Keyboard support =====
  readout.addEventListener('keydown', (e) => {
    // digits
    if (/^[0-9]$/.test(e.key)) {
      // Refuse if length is already MAX_LEN and nothing selected
      const start = readout.selectionStart ?? readout.value.length;
      const end   = readout.selectionEnd   ?? readout.value.length;
      const currentLen = readout.value.length;
      const replacing  = end - start;

      if (currentLen - replacing >= MAX_LEN) {
        e.preventDefault();
        return;
      }
      e.preventDefault();
      insertDigit(e.key);
    }
    if (e.key === 'Backspace') { e.preventDefault(); deleteLeft(); }
    if (e.key === 'Delete')    { e.preventDefault(); deleteRight(); }
    if (e.key === 'Enter')     { e.preventDefault(); submitCurrent(); }
  });

  // ===== Paste handling: sanitize to digits and trim to 4 =====
  readout.addEventListener('paste', (e) => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text');
    const digits = text.replace(/\D+/g, '');
    if (!digits) return;

    const start  = readout.selectionStart ?? readout.value.length;
    const end    = readout.selectionEnd   ?? readout.value.length;
    const before = readout.value.slice(0, start);
    const after  = readout.value.slice(end);

    // Fit as many digits as possible up to MAX_LEN
    const available = MAX_LEN - (before.length + after.length);
    const toInsert  = digits.slice(0, Math.max(0, available));

    const candidate = (before + toInsert + after).slice(0, MAX_LEN);
    readout.value = candidate;
    setCaret((before + toInsert).length);
  });

  // ===== Input sanitation guard: enforce digits-only & length =====
  readout.addEventListener('input', () => {
    const cleaned = readout.value.replace(/\D+/g, '').slice(0, MAX_LEN);
    if (readout.value !== cleaned) {
      const caret = Math.min(getCaret(), cleaned.length);
      readout.value = cleaned;
      setCaret(caret);
    }
  });

  // Example: listen for submit
  readout.addEventListener('keypad:submit', (e) => {
    console.log('Submitted:', e.detail.value);
  });

    const v = readout.value.trim();
	console.log("in updateSuccessState");
    if (v === TARGET_OK) {
      displayEl.classList.add('success');
      // Optional: announce state change for screen readers
      announce?.('Code accepted: 3333');
    } else {
      displayEl.classList.remove('success');
    }
}
*/
</script>



</body>
</html>
