
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pure CSS Keypad with Display</title>
<style>
  :root{
    /* Theme */
    --bg: #101318;
    --panel: #171b22;
    --panel-border: #232a36;
    --key-text: #eaf0ff;
    --accent: #4da3ff;
    --glow: rgba(77,163,255,.25);

    /* Display */
    --display-bg: #ffffff;
    --display-text: #1b2230;
    --display-glass: rgba(255,255,255,.75);
    --display-border: #d8dee9;
    --display-shadow: 0 12px 20px rgba(0,0,0,.35);

    /* Sizing */
    --panel-w: 320px;
    --panel-h: 540px;             /* taller to make room for the display */
    --display-h: 86px;
    --key-size: 82px;
    --key-radius: 18px;
    --gap: 12px;

    /* Key effects */
    --key-light: linear-gradient(135deg, #2a3342 0%, #1b2230 60%);
    --key-shine: radial-gradient(120px 80px at 30% 20%, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 55%);
    --key-shadow: 0 8px 16px rgba(0,0,0,.45), inset 0 -2px 0 rgba(0,0,0,.35);

    /* Pressed state effects */
    --key-light-down: linear-gradient(135deg, #222a38 0%, #141a24 60%);
    --key-shadow-down: 0 4px 8px rgba(0,0,0,.55), inset 0 3px 10px rgba(0,0,0,.55);
    --press-translate: 2px;
    --press-scale: 0.985;
    --focus-ring: #74b2ff;
  }

  /* Page backdrop */
  body{
    margin:0;
    min-height:100svh;
    display:grid;
    place-items:center;
    background:
      radial-gradient(800px 400px at 70% -10%, var(--glow) 0%, transparent 60%),
      radial-gradient(600px 300px at 10% 110%, rgba(77,255,186,.12) 0%, transparent 55%),
      var(--bg);
    color:#fff;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
  }

  /* Phone panel */
  .panel{
    width:var(--panel-w);
    height:var(--panel-h);
    padding:24px 22px;
    border-radius:28px;
    background: linear-gradient(180deg, #0e1218 0%, var(--panel) 100%);
    border:1px solid var(--panel-border);
    box-shadow: 0 30px 60px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.06);
    display:grid;
    grid-template-rows: auto /* speaker */ auto /* display */ 1fr /* keys */ auto /* dots */;
    gap:18px;
    position:relative;
    transition: transform .12s ease;
  }

  /* Panel micro feedback while pressing (modern browsers) */
  .panel:has(.key:active){ transform: translateY(1px); }

  /* Top “speaker” slot (decoration) */
  .speaker{
    width: 40%;
    height: 8px;
    margin: 0 auto 2px;
    border-radius: 6px;
    background: linear-gradient(180deg, #2b3342 0%, #161b24 100%);
    box-shadow: inset 0 1px 2px rgba(255,255,255,.07), inset 0 -2px 3px rgba(0,0,0,.35);
  }

  /* ===== White display attached to the keypad ===== */
  .display-wrap{
    position: relative;
    width: 100%;
    display: grid;
    justify-items: center;
  }

  .display{
    width: calc(var(--panel-w) - 64px); /* inset slightly */
    max-width: 100%;
    height: var(--display-h);
    border-radius: 16px;
    background: var(--display-bg);
    color: var(--display-text);
    border: 1px solid var(--display-border);
    box-shadow:
      var(--display-shadow),
      inset 0 1px 0 rgba(0,0,0,.03);
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 14px 16px;
    gap: 10px;
  }

  /* Glassy top sheen */
  .display::before{
    content:"";
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:0;
    width: 96%;
    height: 48%;
    border-radius: 16px 16px 12px 12px;
    background: linear-gradient(180deg, var(--display-glass) 0%, rgba(255,255,255,.25) 55%, rgba(255,255,255,0) 100%);
    pointer-events:none;
  }

  /* “Attachment”: a small bracket that visually ties display to keys */
  .display-bracket{
    position:absolute;
    bottom:-10px;
    width: calc(var(--panel-w) - 120px);
    height: 18px;
    background: linear-gradient(180deg, #202634 0%, #141a24 100%);
    border: 1px solid #0a0d12;
    border-radius: 10px;
    box-shadow: 0 6px 12px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06);
  }

  /* Content inside display */
  .display .readout{
    font-weight: 700;
    font-size: 22px;
    letter-spacing: .03em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .display .status{
    justify-self: end;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 999px;
    color: #2c3a52;
    background: #eef3fb;
    border: 1px solid #dbe6f6;
  }

  /* Key grid */
  .keys{
    display:grid;
    grid-template-columns: repeat(3, var(--key-size));
    grid-auto-rows: var(--key-size);
    justify-content:center;
    align-content:center;
    gap:var(--gap);
    margin-top: 8px; /* small visual separation below bracket */
  }

  /* Base key style */
  .key{
    position:relative;
    border-radius:var(--key-radius);
    background: var(--key-light), var(--key-shine);
    box-shadow: var(--key-shadow);
    border:1px solid #0a0d12;
    display:grid;
    place-items:center;
    color:var(--key-text);
    text-align:center;
    font-weight:700;
    letter-spacing:.02em;
    user-select:none;
    cursor:pointer;
    transition: transform .12s ease, box-shadow .12s ease, background .12s ease, filter .12s ease;
    outline: none;
    touch-action: manipulation;
  }

  .key::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:inherit;
    box-shadow: inset 0 2px 8px rgba(255,255,255,.05);
    pointer-events:none;
    transition: opacity .12s ease;
  }

  /* Numerals + sublabels */
  .key .main{ font-size:28px; line-height:1; }
  .key .sub{ margin-top:4px; font-size:11px; opacity:.65; letter-spacing:.08em; }

  /* Special keys */
  .special{
    color:#cfe3ff;
    background: linear-gradient(135deg, #233043 0%, #192331 55%), var(--key-shine);
  }

  /* Call button accent */
  .call{
    background: linear-gradient(135deg, #214a33 0%, #173824 55%), var(--key-shine);
    color:#c9f7df;
  }
  .call svg{ width:22px; height:22px; filter: drop-shadow(0 1px 0 rgba(0,0,0,.4)); }

  /* --- Interaction states --- */
  @media (hover:hover){
    .key:hover{ filter: brightness(1.06) saturate(1.02); }
  }

  .key:focus-visible{
    box-shadow: 0 0 0 2px rgba(0,0,0,.65), 0 0 0 4px var(--focus-ring), var(--key-shadow);
  }

  .key:active{
    transform: translateY(var(--press-translate)) scale(var(--press-scale));
    background: var(--key-light-down), var(--key-shine);
    box-shadow: var(--key-shadow-down);
  }
  .key:active::before{ opacity:.02; }

  .special:active{ background: linear-gradient(135deg, #1d2736 0%, #131b26 55%), var(--key-shine); }
  .call:active{    background: linear-gradient(135deg, #1a3f2b 0%, #112a1d 55%), var(--key-shine); }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce){
    .key, .panel{ transition: none; }
    .key:active{ transform: none; }
    .panel:has(.key:active){ transform: none; }
  }

  /* Footer dots (decoration) */
  .dots{
    display:flex;
    justify-content:center;
    gap:8px;
    opacity:.35;
  }
  .dots i{
    width:6px; height:6px;
    border-radius:50%;
    background:#93baff;
  }

  /* Responsive scaling */
  @media (max-width: 380px){
    :root{
      --panel-w: 92vw;
      --panel-h: 160vw;  /* slightly taller on small screens */
      --display-h: 22vw;
      --key-size: 22vw;
      --gap: 3.2vw;
    }
    .display{ width: calc(100% - 64px); }
    .display-bracket{ width: calc(100% - 120px); }
  }
</style>
</head>
<body>

  <section class="panel" role="img" aria-label="Stylized phone keypad with attached white display panel made in CSS">
    <div class="speaker"></div>

    <!-- White display panel area -->
    <div class="display-wrap" aria-hidden="false">
      <div class="display" role="img" aria-label="Display panel showing placeholder digits">
        <div class="readout">555&nbsp;&middot;&nbsp;1212</div>
        <div class="status">READY</div>
      </div>
      <div class="display-bracket" aria-hidden="true"></div>
    </div>

    <!-- Keys -->
    <div class="keys">
      <!-- Row 1 -->
      <div class="key" tabindex="0" role="button" aria-label="Key 1"><div><div class="main">1</div><div class="sub">—</div></div></div>
      <div class="key" tabindex="0" role="button" aria-label="Key 2 ABC"><div><div class="main">2</div><div class="sub">ABC</div></div></div>
      <div class="key" tabindex="0" role="button" aria-label="Key 3 DEF"><div><div class="main">3</div><div class="sub">DEF</div></div></div>

      <!-- Row 2 -->
      <div class="key" tabindex="0" role="button" aria-label="Key 4 GHI"><div><div class="main">4</div><div class="sub">GHI</div></div></div>
      <div class="key" tabindex="0" role="button" aria-label="Key 5 JKL"><div><div class="main">5</div><div class="sub">JKL</div></div></div>
      <div class="key" tabindex="0" role="button" aria-label="Key 6 MNO"><div><div class="main">6</div><div class="sub">MNO</div></div></div>

      <!-- Row 3 -->
      <div class="key" tabindex="0" role="button" aria-label="Key 7 PQRS"><div><div class="main">7</div><div class="sub">PQRS</div></div></div>
      <div class="key" tabindex="0" role="button" aria-label="Key 8 TUV"><div><div class="main">8</div><div class="sub">TUV</div></div></div>
      <div class="key" tabindex="0" role="button" aria-label="Key 9 WXYZ"><div><div class="main">9</div><div class="sub">WXYZ</div></div></div>

      <!-- Row 4 -->
      <div class="key special" tabindex="0" role="button" aria-label="Star"><div><div class="main">*</div></div></div>
      <div class="key" tabindex="0" role="button" aria-label="Zero plus"><div><div class="main">0</div><div class="sub">+</div></div></div>
      <div class="key special" tabindex="0" role="button" aria-label="Pound"><div><div class="main">#</div></div></div>

      <!-- Row 5: call button -->
      <div class="key call" tabindex="0" role="button" aria-label="Call" style="grid-column: 1 / span 3;">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.02-.24c1.12.37 2.33.57 3.57.57a1 1 0 011 1v3.59a1 1 0 01-1 1C11.04 22.91 1.09 12.96 1.91 3a1 1 0 011-1h3.59a1 1 0 011 1c0 1.24.2 2.45.57 3.57a1 1 0 01-.24 1.02l-2.2 2.2z"/>
        </svg>
      </div>
    </div>

    <div class="dots" aria-hidden="true">
      <i></i><i></i><i></i><i></i>
    </div>
  </section>

</body>
</html>
